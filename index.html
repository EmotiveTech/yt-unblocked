<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Video Hub</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --text: #efefef; --accent: #ff0000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .container { max-width: 1000px; margin: 0 auto; }

        /* Search Bar */
        .search-box { display: flex; gap: 10px; margin-bottom: 25px; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #000; color: white; outline: none; }
        button { padding: 10px 25px; border-radius: 25px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* Video Player Area */
        #player-wrapper { display: none; margin-bottom: 30px; background: #000; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .video-frame { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-frame iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: #444; background: #2a2a2a; }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-info { padding: 12px; font-size: 14px; font-weight: bold; }

        h2 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-box">
        <input type="text" id="query" placeholder="Search for a video...">
        <button onclick="searchVideos()">Search</button>
    </div>

    <div id="player-wrapper">
        <div class="video-frame">
            <iframe id="main-player" 
                    src="" 
                    allow="autoplay; fullscreen" 
                    referrerpolicy="strict-origin-when-cross-origin" 
                    allowfullscreen>
            </iframe>
        </div>
        <h3 id="playing-title" style="margin-top: 15px;"></h3>
    </div>

    <h2 id="results-label">Loading your feed...</h2>
    <div id="results-grid" class="video-grid"></div>
</div>

<script>
    var API_KEY = 'YOUR_API_KEY_HERE'; // <--- PUT YOUR KEY HERE

    window.onload = function() {
        if (API_KEY !== 'YOUR_API_KEY_HERE') {
            loadMyFeed();
        } else {
            document.getElementById('results-label').innerText = "Please add your API key to the code!";
        }
    };

    function loadMyFeed() {
        // 1. Grab the history from localStorage (or create an empty array if none exists)
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        var url = '';

        if (history.length === 0) {
            // 2. If you haven't watched anything yet, load Trending videos
            document.getElementById('results-label').innerText = 'Trending (Watch videos to build your FYP!)';
            url = 'https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=US&maxResults=15&key=' + API_KEY;
        } else {
            // 3. Pick a random video title from your watch history to base the feed on
            var randomPastVideo = history[Math.floor(Math.random() * history.length)];
            
            // Clean up the text for the label so it doesn't get too long
            var shortTitle = randomPastVideo.length > 30 ? randomPastVideo.substring(0, 30) + '...' : randomPastVideo;
            document.getElementById('results-label').innerText = 'Because you watched: "' + shortTitle + '"';
            
            // Search YouTube for videos related to that past video
            url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&type=video&videoEmbeddable=true&key=' + API_KEY + '&q=' + encodeURIComponent(randomPastVideo);
        }
        
        fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) { 
                if(data.items) { render(data.items); }
            })
            .catch(function(err) { console.log("Error fetching feed"); });
    }

    function searchVideos() {
        var q = document.getElementById('query').value;
        if (!q) return;
        
        document.getElementById('results-label').innerText = 'Search Results for: "' + q + '"';
        
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&type=video&videoEmbeddable=true&key=' + API_KEY + '&q=' + encodeURIComponent(q);
        
        fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) { 
                if(data.items) { render(data.items); } 
            })
            .catch(function(err) { console.log("Error fetching search"); });
    }

    function render(items) {
        var grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 
        
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            
            var id = item.id.videoId || item.id; 
            var title = item.snippet.title;
            var thumb = item.snippet.thumbnails.medium.url;
            
            var card = document.createElement('div');
            card.className = 'card';
            
            card.innerHTML = '<img src="' + thumb + '"><div class="card-info">' + title + '</div>';
            
            card.onclick = (function(v_id, v_title) {
                return function() { 
                    playVideo(v_id, v_title); 
                };
            })(id, title);
            
            grid.appendChild(card);
        }
    }

    function playVideo(id, title) {
        // --- NEW FYP TRACKING LOGIC ---
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        
        // Don't save the exact same title twice in a row
        if (history.length === 0 || history[0] !== title) {
            history.unshift(title); // Add new video to the front of the list
        }
        
        // Keep the history at a maximum of 20 videos so it doesn't slow down your browser
        if (history.length > 20) {
            history.pop();
        }
        
        // Save the updated list back to the computer
        localStorage.setItem('yt_my_history', JSON.stringify(history));
        // ------------------------------

        document.getElementById('player-wrapper').style.display = 'block';
        document.getElementById('playing-title').innerText = title;
        
        var playerUrl = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
        document.getElementById('main-player').src = playerUrl;
        
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>


</body>
</html>
