<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Video Hub</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card: #1e1e1e; 
            --text: #efefef; 
            --accent: #ff0000; 
            --border: #333333;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; transition: background 0.3s, color 0.3s; }
        .container { max-width: 1000px; margin: 0 auto; }

        /* Navigation & Search */
        .top-nav { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { border-color: var(--accent); }
        
        .search-container { display: flex; flex: 1; min-width: 250px; gap: 5px; }
        input[type="text"] { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        .search-btn { padding: 10px 25px; border-radius: 25px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        /* Theme Controls */
        .theme-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .color-picker { -webkit-appearance: none; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; background: none; }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 50%; }

        /* Category Chips */
        .chip-container { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 16px; border-radius: 15px; background: var(--card); color: var(--text); border: 1px solid var(--border); cursor: pointer; white-space: nowrap; font-size: 14px; transition: 0.2s; }
        .chip:hover { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* NEW: Special style for the Random button */
        .chip-random { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .progress-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; }
        
        .card-info { padding: 12px; font-size: 14px; font-weight: bold; flex-grow: 1; }
        .queue-add-btn { margin: 0 12px 12px 12px; padding: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .queue-add-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* NEW: Stats Dashboard Styles */
        .stats-dashboard { background: var(--card); border: 1px solid var(--accent); border-radius: 15px; padding: 40px; text-align: center; max-width: 500px; margin: 40px auto; }
        .stats-number { font-size: 3rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .stats-label { font-size: 1.2rem; color: #888; }

        h2 { font-size: 1.2rem; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .clear-btn { font-size: 12px; background: none; border: 1px solid #ff4444; color: #ff4444; padding: 5px 10px; border-radius: 15px; cursor: pointer; display: none; }
        .clear-btn:hover { background: #ff4444; color: white; }

        .load-more-container { text-align: center; margin-top: 40px; }
        #load-more-btn { display: none; padding: 12px 30px; font-size: 16px; border-radius: 25px; border: none; background: var(--card); color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; margin: 0 auto; border: 1px solid var(--border); }
        #load-more-btn:hover { border-color: var(--accent); }

        /* Mini Player & Draggable Feature */
        #mini-player { display: none; position: fixed; bottom: 20px; right: 20px; width: 380px; background: var(--bg); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid var(--border); z-index: 1000; overflow: hidden; transition: width 0.3s, height 0.3s; }
        
        /* NEW: Drag cursor indicator */
        .player-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: var(--card); cursor: grab; user-select: none; }
        .player-header:active { cursor: grabbing; }
        
        #mini-player.theater-mode { width: 80vw; max-width: 1000px; bottom: 50% !important; right: 50% !important; left: 50% !important; top: 50% !important; transform: translate(-50%, -50%); box-shadow: 0 0 0 100vmax rgba(0,0,0,0.9); }
        
        .player-title { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%; pointer-events: none; }
        
        .player-controls { display: flex; gap: 10px; }
        .ctrl-btn { background: none; border: none; color: var(--text); font-size: 14px; cursor: pointer; padding: 0 5px; font-weight: bold; transition: 0.2s; }
        .ctrl-btn:hover { color: var(--accent); }
        
        .video-frame { position: relative; padding-bottom: 56.25%; height: 0; background: #000; pointer-events: auto; }
        #yt-api-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <button class="nav-btn" onclick="loadMyFeed()">🏠 My FYP</button>
        <button class="nav-btn" onclick="showHistory()">🕒 History</button>
        <button class="nav-btn" onclick="showQueue()">📋 Queue</button>
        <button class="nav-btn" onclick="showStats()">📊 Stats</button>
        
        <div class="search-container">
            <input type="text" id="query" placeholder="Search for a video...">
            <button class="search-btn" onclick="searchVideos()">Search</button>
        </div>
        
        <div class="theme-controls">
            <input type="color" id="accent-picker" class="color-picker" value="#ff0000" onchange="changeAccentColor()">
            <button class="nav-btn" onclick="toggleTheme()">🌓 Theme</button>
        </div>
    </div>

    <div class="chip-container">
        <button class="chip chip-random" onclick="playRandomVideo()">🎲 Surprise Me</button>
        
        <button class="chip" onclick="searchCategory('Gaming')">🎮 Gaming</button>
        <button class="chip" onclick="searchCategory('Music')">🎵 Music</button>
        <button class="chip" onclick="searchCategory('Coding')">💻 Coding</button>
        <button class="chip" onclick="searchCategory('Comedy')">🤣 Comedy</button>
        <button class="chip" onclick="searchCategory('Podcasts')">🎙️ Podcasts</button>
        <button class="chip" onclick="searchCategory('Science')">🔬 Science</button>
    </div>

    <h2>
        <span id="results-label">Loading your feed...</span>
        <button id="clear-history-btn" class="clear-btn" onclick="clearHistory()">Clear History</button>
    </h2>
    
    <div id="results-grid" class="video-grid"></div>
    
    <div class="load-more-container">
        <button id="load-more-btn" onclick="loadMore()">↓ Load More Videos ↓</button>
    </div>
</div>

<div id="mini-player">
    <div class="player-header" id="drag-header">
        <div id="mini-title" class="player-title">Playing...</div>
        <div class="player-controls">
            <button class="ctrl-btn" onclick="togglePlayPause()" id="play-pause-btn">⏸</button>
            <button class="ctrl-btn" onclick="playNextInQueue()">⏭</button>
            <button class="ctrl-btn" onclick="toggleTheaterMode()">⛶</button>
            <button class="ctrl-btn" onclick="closePlayer()">✕</button>
        </div>
    </div>
    <div class="video-frame">
        <div id="yt-api-player"></div>
    </div>
</div>

<script>
    var API_KEY = 'AIzaSyApWV2GTxLf9aVm5I-AKPeSCZQLvEyvUz0'; // <--- PUT YOUR KEY HERE
    
    var ytPlayer; 
    var myQueue = [];
    var currentApiUrl = ''; 
    var nextPageToken = '';
    var timeTracker;
    var currentPlayingId = '';
    var isLightMode = false;

    // --- NEW: Draggable Player Variables ---
    var isDragging = false;
    var dragOffsetX = 0;
    var dragOffsetY = 0;

    window.onload = function() {
        if (API_KEY !== 'YOUR_API_KEY_HERE') {
            loadMyFeed();
            var savedAccent = localStorage.getItem('yt_accent_color');
            if(savedAccent) {
                document.getElementById('accent-picker').value = savedAccent;
                changeAccentColor();
            }
        } else {
            document.getElementById('results-label').innerText = "Please add your API key to the code!";
        }
        setupDraggablePlayer();
    };

    // --- NEW: Draggable (PiP) Logic ---
    function setupDraggablePlayer() {
        var header = document.getElementById('drag-header');
        var playerBox = document.getElementById('mini-player');

        header.onmousedown = function(e) {
            // Prevent dragging if clicking a button or in theater mode
            if(e.target.tagName === 'BUTTON' || playerBox.classList.contains('theater-mode')) return;
            isDragging = true;
            var rect = playerBox.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
        };

        document.onmousemove = function(e) {
            if (isDragging) {
                // Remove the fixed bottom/right snapping so free movement works
                playerBox.style.bottom = 'auto';
                playerBox.style.right = 'auto';
                playerBox.style.left = (e.clientX - dragOffsetX) + 'px';
                playerBox.style.top = (e.clientY - dragOffsetY) + 'px';
            }
        };

        document.onmouseup = function() {
            isDragging = false;
        };
    }

    // --- NEW: Watch Time Stats ---
    function showStats() {
        document.getElementById('results-label').innerText = 'Your Analytics';
        document.getElementById('clear-history-btn').style.display = 'none'; 
        document.getElementById('load-more-btn').style.display = 'none'; 
        
        var totalSeconds = parseInt(localStorage.getItem('yt_total_watch_time')) || 0;
        var hours = Math.floor(totalSeconds / 3600);
        var minutes = Math.floor((totalSeconds % 3600) / 60);

        var grid = document.getElementById('results-grid');
        grid.style.display = 'block'; // Remove grid style temporarily for a clean card
        
        grid.innerHTML = '<div class="stats-dashboard">' +
            '<div class="stats-label">Total Time Watched on Hub</div>' +
            '<div class="stats-number">' + hours + '<span style="font-size: 1.5rem;">hrs</span> ' + minutes + '<span style="font-size: 1.5rem;">mins</span></div>' +
            '<p style="color: #888; font-size: 0.9rem;">This tracks every second a video is actively playing.</p>' +
            '</div>';
    }

    // --- NEW: Random Video Generator ---
    function playRandomVideo() {
        document.getElementById('results-label').innerText = 'Rolling the dice...';
        // A list of fun, totally random topics to pull from
        var randomTopics = ['deep ocean documentary', 'optical illusions', 'history mysteries', 'satisfying restoration', 'space exploration', 'funny animal fails', 'street food tour'];
        var selectedTopic = randomTopics[Math.floor(Math.random() * randomTopics.length)];
        
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&type=video&videoEmbeddable=true&key=' + API_KEY + '&q=' + encodeURIComponent(selectedTopic);
        
        fetch(url)
            .then(function(res) { return res.json(); })
            .then(function(data) { 
                if(data.items && data.items.length > 0) {
                    var item = data.items[0];
                    // Instantly play the first result it finds!
                    playVideo(item.id.videoId, item.snippet.title, item.snippet.thumbnails.medium.url);
                }
            });
    }

    // --- Theme & Navigation Functions ---
    function toggleTheme() {
        var root = document.documentElement;
        isLightMode = !isLightMode;
        if (isLightMode) {
            root.style.setProperty('--bg', '#f0f0f0'); root.style.setProperty('--card', '#ffffff');
            root.style.setProperty('--text', '#111111'); root.style.setProperty('--border', '#dddddd');
        } else {
            root.style.setProperty('--bg', '#0f0f0f'); root.style.setProperty('--card', '#1e1e1e');
            root.style.setProperty('--text', '#efefef'); root.style.setProperty('--border', '#333333');
        }
    }

    function changeAccentColor() {
        var color = document.getElementById('accent-picker').value;
        document.documentElement.style.setProperty('--accent', color);
        localStorage.setItem('yt_accent_color', color);
    }

    function searchCategory(category) {
        document.getElementById('results-grid').style.display = 'grid'; // Reset grid display
        document.getElementById('clear-history-btn').style.display = 'none';
        document.getElementById('results-label').innerText = category + ' Videos';
        currentApiUrl = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&type=video&videoEmbeddable=true&key=' + API_KEY + '&q=' + encodeURIComponent(category + ' trending');
        fetchVideos(currentApiUrl, false);
    }

    function togglePlayPause() {
        if (!ytPlayer) return;
        var state = ytPlayer.getPlayerState();
        var btn = document.getElementById('play-pause-btn');
        if (state === YT.PlayerState.PLAYING) {
            ytPlayer.pauseVideo(); btn.innerText = '▶';
        } else {
            ytPlayer.playVideo(); btn.innerText = '⏸';
        }
    }

    function toggleTheaterMode() {
        var playerBox = document.getElementById('mini-player');
        if (playerBox.classList.contains('theater-mode')) {
            playerBox.classList.remove('theater-mode');
            // Reset to original corner position
            playerBox.style.left = 'auto';
            playerBox.style.top = 'auto';
            playerBox.style.bottom = '20px';
            playerBox.style.right = '20px';
        } else {
            playerBox.classList.add('theater-mode');
            // Clean up inline drag styles so CSS translate works
            playerBox.style.left = ''; playerBox.style.top = '';
        }
    }

    function getProgressHTML(id) {
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        for (var i = 0; i < history.length; i++) {
            if (history[i].id === id && history[i].totalTime > 0) {
                var percentage = (history[i].savedTime / history[i].totalTime) * 100;
                if (percentage > 100) percentage = 100;
                if (percentage > 1) {
                    return '<div class="progress-bg"><div class="progress-bar" style="width:' + percentage + '%;"></div></div>';
                }
            }
        }
        return ''; 
    }

    function loadMyFeed() {
        document.getElementById('results-grid').style.display = 'grid';
        document.getElementById('clear-history-btn').style.display = 'none';
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];

        if (history.length === 0) {
            document.getElementById('results-label').innerText = 'Trending (Watch videos to build your FYP!)';
            currentApiUrl = 'https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=US&maxResults=50&key=' + API_KEY;
        } else {
            var randomPastVideo = history[Math.floor(Math.random() * history.length)];
            var searchTitle = typeof randomPastVideo === 'string' ? randomPastVideo : randomPastVideo.title;
            var shortTitle = searchTitle.length > 30 ? searchTitle.substring(0, 30) + '...' : searchTitle;
            
            document.getElementById('results-label').innerText = 'Because you watched: "' + shortTitle + '"';
            currentApiUrl = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&type=video&videoEmbeddable=true&key=' + API_KEY + '&q=' + encodeURIComponent(searchTitle);
        }
        fetchVideos(currentApiUrl, false);
    }

    function searchVideos() {
        document.getElementById('results-grid').style.display = 'grid';
        document.getElementById('clear-history-btn').style.display = 'none';
        var q = document.getElementById('query').value;
        if (!q) return;
        
        document.getElementById('results-label').innerText = 'Search Results for: "' + q + '"';
        currentApiUrl = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&type=video&videoEmbeddable=true&key=' + API_KEY + '&q=' + encodeURIComponent(q);
        fetchVideos(currentApiUrl, false);
    }

    function fetchVideos(url, isAppending) {
        var finalUrl = url;
        if (isAppending && nextPageToken) finalUrl += '&pageToken=' + nextPageToken;

        fetch(finalUrl)
            .then(function(res) { return res.json(); })
            .then(function(data) { 
                nextPageToken = data.nextPageToken || ''; 
                if(data.items) { render(data.items, isAppending); }
                if (nextPageToken !== '') { document.getElementById('load-more-btn').style.display = 'block'; } 
                else { document.getElementById('load-more-btn').style.display = 'none'; }
            });
    }

    function loadMore() {
        if (currentApiUrl !== '') fetchVideos(currentApiUrl, true);
    }

    function showHistory() {
        document.getElementById('results-grid').style.display = 'grid';
        document.getElementById('results-label').innerText = 'Your Watch History';
        document.getElementById('clear-history-btn').style.display = 'block'; 
        document.getElementById('load-more-btn').style.display = 'none'; 
        
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        var grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 

        if (history.length === 0) {
            grid.innerHTML = '<p>Your history is empty. Go watch some videos!</p>'; return;
        }

        for (var i = 0; i < history.length; i++) {
            var item = history[i];
            var id = typeof item === 'string' ? '' : item.id;
            var title = typeof item === 'string' ? item : item.title;
            var thumb = typeof item === 'string' ? 'https://via.placeholder.com/320x180/222222/ffffff?text=Old+Video' : item.thumb;

            var card = document.createElement('div');
            card.className = 'card';
            var progressHTML = getProgressHTML(id);
            card.innerHTML = '<div class="thumb-container"><img src="' + thumb + '">' + progressHTML + '</div><div class="card-info">' + title + '</div>';
            
            if (id !== '') {
                card.onclick = (function(v_id, v_title, v_thumb) {
                    return function() { playVideo(v_id, v_title, v_thumb); };
                })(id, title, thumb);
            }
            grid.appendChild(card);
        }
    }

    function showQueue() {
        document.getElementById('results-grid').style.display = 'grid';
        document.getElementById('results-label').innerText = 'Up Next (Your Queue)';
        document.getElementById('clear-history-btn').style.display = 'none'; 
        document.getElementById('load-more-btn').style.display = 'none'; 
        
        var grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 

        if (myQueue.length === 0) {
            grid.innerHTML = '<p>Your queue is empty. Click "+ Add to Queue" on a video to line it up!</p>'; return;
        }

        for (var i = 0; i < myQueue.length; i++) {
            var item = myQueue[i];
            var card = document.createElement('div');
            card.className = 'card';
            var progressHTML = getProgressHTML(item.id);
            card.innerHTML = '<div class="thumb-container"><img src="' + item.thumb + '">' + progressHTML + '</div><div class="card-info">' + item.title + '</div>';
            
            card.onclick = (function(v_id, v_title, v_thumb) {
                return function() { playVideo(v_id, v_title, v_thumb); };
            })(item.id, item.title, item.thumb);
            grid.appendChild(card);
        }
    }

    function clearHistory() {
        if (confirm("Are you sure you want to delete your history? This will reset your FYP!")) {
            localStorage.removeItem('yt_my_history');
            showHistory(); 
        }
    }

    function addToQueue(id, title, thumb) {
        myQueue.push({ id: id, title: title, thumb: thumb });
        alert('Added to Queue: ' + title);
    }

    function playNextInQueue() {
        if (myQueue.length > 0) {
            var nextVideo = myQueue.shift(); 
            playVideo(nextVideo.id, nextVideo.title, nextVideo.thumb);
        } else {
            closePlayer(); 
        }
    }

    function render(items, isAppending) {
        var grid = document.getElementById('results-grid');
        if (!isAppending) { grid.innerHTML = ''; }
        
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var id = item.id.videoId || item.id; 
            var title = item.snippet.title;
            var thumb = item.snippet.thumbnails.medium.url;
            
            var card = document.createElement('div');
            card.className = 'card';
            var progressHTML = getProgressHTML(id);
            
            card.innerHTML = '<div class="thumb-container"><img src="' + thumb + '">' + progressHTML + '</div><div class="card-info">' + title + '</div>';
            
            var queueBtn = document.createElement('button');
            queueBtn.className = 'queue-add-btn';
            queueBtn.innerText = '+ Add to Queue';
            queueBtn.onclick = (function(v_id, v_title, v_thumb) {
                return function(e) { e.stopPropagation(); addToQueue(v_id, v_title, v_thumb); };
            })(id, title, thumb);
            
            card.appendChild(queueBtn);
            card.onclick = (function(v_id, v_title, v_thumb) {
                return function() { playVideo(v_id, v_title, v_thumb); };
            })(id, title, thumb);
            
            grid.appendChild(card);
        }
    }

    function saveCurrentTime() {
        if (ytPlayer && currentPlayingId) {
            var currentTime = ytPlayer.getCurrentTime();
            var totalDuration = ytPlayer.getDuration();
            var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
            for (var i = 0; i < history.length; i++) {
                if (history[i].id === currentPlayingId) {
                    history[i].savedTime = currentTime;
                    history[i].totalTime = totalDuration; 
                    break;
                }
            }
            localStorage.setItem('yt_my_history', JSON.stringify(history));
            
            // NEW: Add 2 seconds to global watch time!
            var globalTime = parseInt(localStorage.getItem('yt_total_watch_time')) || 0;
            localStorage.setItem('yt_total_watch_time', globalTime + 2);
        }
    }

    function resetCurrentTime() {
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        for (var i = 0; i < history.length; i++) {
            if (history[i].id === currentPlayingId) { history[i].savedTime = 0; break; }
        }
        localStorage.setItem('yt_my_history', JSON.stringify(history));
    }

    function playVideo(id, title, thumb) {
        currentPlayingId = id; 
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        var startTime = 0;
        var existingIndex = -1;

        for (var i = 0; i < history.length; i++) {
            if (history[i].id === id) {
                existingIndex = i;
                startTime = Math.floor(history[i].savedTime || 0);
                break;
            }
        }

        var currentVideoObj = { id: id, title: title, thumb: thumb, savedTime: startTime, totalTime: 0 };
        if (existingIndex > -1) {
            currentVideoObj.totalTime = history[existingIndex].totalTime || 0;
            history.splice(existingIndex, 1); 
        }
        history.unshift(currentVideoObj); 
        if (history.length > 40) history.pop();
        localStorage.setItem('yt_my_history', JSON.stringify(history));

        document.getElementById('mini-player').style.display = 'block';
        document.getElementById('mini-title').innerText = title;
        document.getElementById('play-pause-btn').innerText = '⏸'; 
        
        if (!ytPlayer) {
            ytPlayer = new YT.Player('yt-api-player', {
                videoId: id,
                playerVars: { 'autoplay': 1, 'rel': 0, 'start': startTime },
                events: {
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            clearInterval(timeTracker);
                            timeTracker = setInterval(saveCurrentTime, 2000); 
                            document.getElementById('play-pause-btn').innerText = '⏸';
                        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                            clearInterval(timeTracker);
                            saveCurrentTime(); 
                            document.getElementById('play-pause-btn').innerText = '▶';
                            
                            if (event.data === YT.PlayerState.ENDED) {
                                resetCurrentTime(); playNextInQueue();
                            }
                        }
                    }
                }
            });
        } else {
            ytPlayer.loadVideoById({ videoId: id, startSeconds: startTime });
        }
    }

    function closePlayer() {
        var playerBox = document.getElementById('mini-player');
        playerBox.style.display = 'none';
        playerBox.classList.remove('theater-mode'); 
        
        // Reset position so it goes back to the corner next time
        playerBox.style.left = 'auto'; playerBox.style.top = 'auto';
        playerBox.style.bottom = '20px'; playerBox.style.right = '20px';
        
        if (ytPlayer) {
            saveCurrentTime(); clearInterval(timeTracker); ytPlayer.stopVideo(); 
        }
        
        var currentLabel = document.getElementById('results-label').innerText;
        if (currentLabel === 'Your Watch History') { showHistory(); } 
        else if (currentLabel === 'Up Next (Your Queue)') { showQueue(); }
    }
</script>
<script>
 // --- FAZBEAR TAB RENAMER V3.0 (AUTO-GRABBER) ---

(function() {
    // 1. SETUP HTML FOR THE MENU
    const html = `
    <div id="cloaker-menu" style="
        display: none; 
        position: fixed; 
        top: 50%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        background: #111; 
        border: 2px solid #b30000; 
        padding: 20px; 
        z-index: 99999; 
        font-family: 'Courier New', monospace; 
        color: #eee; 
        text-align: center;
        box-shadow: 0 0 50px #000;
        width: 350px;
    ">
        <h3 style="color: #b30000; margin-top: 0;">TAB CLOAKER V3</h3>
        
        <label style="font-size: 0.8rem; color: #888;">QUICK SELECT:</label><br>
        <select id="cloak-preset" style="width: 95%; margin-bottom: 15px; padding: 5px; background: #222; color: #fff; border: 1px solid #444;">
            <option value="">-- Choose a Disguise --</option>
            <option value="Google Drive|https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">Google Drive</option>
            <option value="Google Classroom|https://ssl.gstatic.com/classroom/favicon.png">Google Classroom</option>
            <option value="Google Docs|https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">Google Docs</option>
            <option value="My Drive - Google Drive|https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">My Drive</option>
            <option value="Inbox (1) - Gmail|https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico">Gmail</option>
            <option value="Wikipedia|https://en.wikipedia.org/static/favicon/wikipedia.ico">Wikipedia</option>
            <option value="Canvas|https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico">Canvas</option>
            <option value="Schoology|https://ui.schoology.com/design-system/assets/favicon-d123.ico">Schoology</option>
        </select>
        
        <hr style="border-color: #333; margin: 10px 0;">

        <label style="font-size: 0.8rem;">TAB TITLE:</label><br>
        <input type="text" id="cloak-title" placeholder="e.g. Math Notes" style="width: 90%; margin-bottom: 10px; padding: 5px; background: #000; color: #fff; border: 1px solid #333;"><br>
        
        <label style="font-size: 0.8rem;">WEBSITE ICON GRABBER:</label><br>
        <div style="display: flex; justify-content: center; gap: 5px; margin-bottom: 15px;">
            <input type="text" id="cloak-domain" placeholder="e.g. roblox.com" style="width: 60%; padding: 5px; background: #000; color: #fff; border: 1px solid #333;">
            <button id="btn-grab" style="width: 30%; background: #444; color: white; border: none; cursor: pointer; font-size: 0.7rem;">GET ICON</button>
        </div>

        <input type="hidden" id="cloak-icon-url">
        
        <div style="margin-bottom: 15px;">
            <img id="icon-preview" src="" style="width: 32px; height: 32px; display: none; border: 1px solid #555;">
        </div>
        
        <button id="btn-cloak" style="background: #b30000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;">APPLY</button>
        <button id="btn-reset-cloak" style="background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-left: 5px;">RESET</button>
        
        <div style="margin-top: 10px; font-size: 0.7rem; color: #666;">Press Alt + R to Open / ESC to Close</div>
    </div>
    `;

    // Add to body
    const div = document.createElement('div');
    div.innerHTML = html;
    document.body.appendChild(div);

    // --- VARIABLES ---
    const menu = document.getElementById('cloaker-menu');
    const inputTitle = document.getElementById('cloak-title');
    const inputDomain = document.getElementById('cloak-domain');
    const inputIconUrl = document.getElementById('cloak-icon-url');
    const selectPreset = document.getElementById('cloak-preset');
    const imgPreview = document.getElementById('icon-preview');
    
    const btnGrab = document.getElementById('btn-grab');
    const btnApply = document.getElementById('btn-cloak');
    const btnReset = document.getElementById('btn-reset-cloak');

    // --- FUNCTIONS ---

    function setFavicon(url) {
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.getElementsByTagName('head')[0].appendChild(link);
        }
        link.href = url;
    }

    function loadSettings() {
        const savedTitle = localStorage.getItem('faz_cloak_title');
        const savedIcon = localStorage.getItem('faz_cloak_icon');

        if (savedTitle) {
            document.title = savedTitle;
            inputTitle.value = savedTitle;
        }

        if (savedIcon) {
            setFavicon(savedIcon);
            inputIconUrl.value = savedIcon;
            showPreview(savedIcon);
        }
    }

    function showPreview(url) {
        imgPreview.src = url;
        imgPreview.style.display = 'inline-block';
    }

    // 1. PRESET HANDLER
    selectPreset.addEventListener('change', function() {
        const val = this.value;
        if(!val) return;
        
        const parts = val.split('|'); // Split "Name|URL"
        inputTitle.value = parts[0];
        inputIconUrl.value = parts[1];
        showPreview(parts[1]);
    });

    // 2. DOMAIN GRABBER HANDLER
    btnGrab.addEventListener('click', function() {
        const domain = inputDomain.value.trim();
        if(!domain) return;

        // Use Google's S2 Service to fetch favicon
        const iconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        
        inputIconUrl.value = iconUrl;
        showPreview(iconUrl);
    });

    // 3. APPLY SETTINGS
    function applyCloak() {
        const t = inputTitle.value;
        const i = inputIconUrl.value;

        if (t) {
            document.title = t;
            localStorage.setItem('faz_cloak_title', t);
        }
        
        if (i) {
            setFavicon(i);
            localStorage.setItem('faz_cloak_icon', i);
        }

        menu.style.display = 'none';
    }

    // 4. RESET
    function resetCloak() {
        localStorage.removeItem('faz_cloak_title');
        localStorage.removeItem('faz_cloak_icon');
        location.reload(); 
    }

    // --- KEY LISTENERS ---
    document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key.toLowerCase() === 'r') {
            e.preventDefault();
            menu.style.display = 'block';
        }
        if (e.key === 'Escape') {
            menu.style.display = 'none';
        }
    });

    btnApply.addEventListener('click', applyCloak);
    btnReset.addEventListener('click', resetCloak);

    // Load on start
    loadSettings();

})();
</script>
</body>
</html>
