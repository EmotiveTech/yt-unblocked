<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Video Hub</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card: #1e1e1e; 
            --text: #efefef; 
            --accent: #ff0000; 
            --border: #333333;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 50px; transition: background 0.3s, color 0.3s; }
        
        /* Navigation & Core UI */
        .top-nav { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-btn:hover { border-color: var(--accent); }
        .back-btn { background: var(--accent); color: white; border: none; }
        
        .search-container { display: flex; flex: 1; min-width: 250px; gap: 5px; }
        input[type="text"] { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        .search-btn { padding: 10px 25px; border-radius: 25px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

        .theme-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
        .color-picker { -webkit-appearance: none; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; background: none; }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 50%; }

        /* Video Grid & Cards */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .progress-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; }
        
        .card-info { padding: 12px; font-size: 14px; font-weight: bold; flex-grow: 1; }
        .card-channel { font-size: 12px; color: #aaa; margin-top: 5px; font-weight: normal; }
        
        .card-actions { display: flex; gap: 5px; padding: 0 12px 12px 12px; }
        .action-btn { flex: 1; padding: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        h2, h3 { border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }

        /* VIEW CONTAINERS */
        #main-view, #watch-view, #channel-view { display: none; max-width: 1200px; margin: 0 auto; }
        #main-view { display: block; } /* Default visible */

        /* --- WATCH PAGE STYLES --- */
        .watch-layout { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .watch-left { flex: 1; min-width: 60%; }
        .watch-right { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        
        .video-player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        #yt-api-player { width: 100%; height: 100%; border: none; }
        
        .watch-title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        
        .watch-details-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .creator-bar { display: flex; align-items: center; gap: 15px; cursor: pointer; padding-bottom: 15px; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .creator-bar:hover { opacity: 0.8; }
        .creator-avatar { width: 50px; height: 50px; border-radius: 50%; background: #333; object-fit: cover; }
        .creator-name { font-weight: bold; font-size: 16px; }
        
        .watch-description { margin-top: 15px; font-size: 14px; color: #ccc; white-space: pre-wrap; line-height: 1.5; max-height: 200px; overflow-y: auto; }
        
        .recommended-label { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .side-card { display: flex; gap: 10px; cursor: pointer; transition: 0.2s; }
        .side-card:hover { transform: scale(1.02); }
        .side-thumb { width: 160px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000; flex-shrink: 0; }
        .side-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .side-info { font-size: 13px; font-weight: bold; }
        .side-channel { font-size: 11px; color: #aaa; margin-top: 4px; font-weight: normal; }

        /* --- CHANNEL PAGE STYLES --- */
        .channel-header { display: flex; align-items: center; gap: 30px; background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--border); margin-top: 20px; margin-bottom: 30px; }
        .channel-header-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
        .channel-header-info h1 { margin: 0 0 10px 0; font-size: 28px; }
        .channel-stats { color: #aaa; font-size: 14px; }
        
    </style>
</head>
<body>

<div class="top-nav">
    <button class="nav-btn back-btn" id="global-back-btn" onclick="goHome()" style="display: none;">⬅ Back to Home</button>
    <button class="nav-btn" onclick="loadMyFeed()">🏠 My FYP</button>
    <button class="nav-btn" onclick="showHistory()">🕒 History</button>
    <button class="nav-btn" onclick="showQueue()">📋 Queue</button>
    
    <div class="search-container">
        <input type="text" id="query" placeholder="Search for a video...">
        <button class="search-btn" onclick="searchVideos()">Search</button>
    </div>
    
    <div class="theme-controls">
        <input type="color" id="accent-picker" class="color-picker" value="#ff0000" onchange="changeAccentColor()">
    </div>
</div>

<div id="main-view">
    <h2 id="results-label">Loading your feed...</h2>
    <div id="results-grid" class="video-grid"></div>
</div>

<div id="watch-view">
    <div class="watch-layout">
        <div class="watch-left">
            <div class="video-player-container">
                <div id="yt-api-player"></div>
            </div>
            <div class="watch-title" id="watch-title-display">Video Title</div>
            
            <div class="watch-details-box">
                <div class="creator-bar" id="watch-creator-btn">
                    <img src="" id="watch-creator-avatar" class="creator-avatar" alt="Profile">
                    <div class="creator-name" id="watch-creator-name">Creator Name</div>
                </div>
                <div class="watch-description" id="watch-description-display">Loading description...</div>
            </div>
        </div>
        
        <div class="watch-right">
            <div class="recommended-label">Recommended for you</div>
            <div id="recommended-grid"></div>
        </div>
    </div>
</div>

<div id="channel-view">
    <div class="channel-header">
        <img src="" id="channel-page-avatar" class="channel-header-avatar" alt="Channel Avatar">
        <div class="channel-header-info">
            <h1 id="channel-page-name">Creator Name</h1>
            <div class="channel-stats" id="channel-page-stats">Loading stats...</div>
        </div>
    </div>
    <h3>Latest Videos</h3>
    <div id="channel-video-grid" class="video-grid"></div>
</div>

<script>
    var API_KEY = 'AIzaSyApWV2GTxLf9aVm5I-AKPeSCZQLvEyvUz0'; // <--- PUT YOUR KEY HERE
    var ytPlayer; 
    var myQueue = [];
    var currentPlayingId = '';
    var timeTracker;

    window.onload = function() {
        if (API_KEY !== 'YOUR_API_KEY_HERE') {
            loadMyFeed();
        } else {
            document.getElementById('results-label').innerText = "Please add your API key to the code!";
        }
    };

    // --- VIEW CONTROLLER ---
    function showView(viewId) {
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('watch-view').style.display = 'none';
        document.getElementById('channel-view').style.display = 'none';
        
        document.getElementById(viewId).style.display = 'block';
        
        if (viewId === 'main-view') {
            document.getElementById('global-back-btn').style.display = 'none';
            if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        } else {
            document.getElementById('global-back-btn').style.display = 'block';
        }
    }

    function goHome() {
        showView('main-view');
        loadMyFeed(); // Refresh the feed to show updated progress bars
    }

    // --- CARD BUILDER ---
    function createCard(id, title, thumb, channelTitle, channelId) {
        var card = document.createElement('div');
        card.className = 'card';
        var progressHTML = getProgressHTML(id);
        
        var safeChannel = channelTitle ? channelTitle : 'Unknown Creator';
        
        card.innerHTML = 
            '<div class="thumb-container"><img src="' + thumb + '">' + progressHTML + '</div>' +
            '<div class="card-info">' + title + '<div class="card-channel">' + safeChannel + '</div></div>';
        
        var actions = document.createElement('div');
        actions.className = 'card-actions';

        var queueBtn = document.createElement('button');
        queueBtn.className = 'action-btn';
        queueBtn.innerText = '+ Queue';
        queueBtn.onclick = function(e) { e.stopPropagation(); addToQueue(id, title, thumb, safeChannel, channelId); };

        actions.appendChild(queueBtn);
        card.appendChild(actions);

        card.onclick = function() { playVideo(id, title, thumb, safeChannel, channelId); };
        return card;
    }

    // --- WATCH PAGE LOGIC ---
    function playVideo(id, title, thumb, channelTitle, channelId) {
        currentPlayingId = id; 
        showView('watch-view');
        
        // Update basic UI instantly
        document.getElementById('watch-title-display').innerText = title;
        document.getElementById('watch-creator-name').innerText = channelTitle || 'Loading...';
        document.getElementById('watch-description-display').innerText = 'Loading description...';
        document.getElementById('watch-creator-avatar').src = 'https://via.placeholder.com/50/333333/ffffff?text=?';

        // Setup Creator Click
        document.getElementById('watch-creator-btn').onclick = function() {
            if (channelId) openChannelPage(channelId, channelTitle);
        };

        // Initialize Player
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        var startTime = 0;
        for (var i = 0; i < history.length; i++) {
            if (history[i].id === id) { startTime = Math.floor(history[i].savedTime || 0); break; }
        }

        // Save to history
        var currentVideoObj = { id: id, title: title, thumb: thumb, channelTitle: channelTitle, channelId: channelId, savedTime: startTime, totalTime: 0 };
        history = history.filter(function(v) { return v.id !== id; });
        history.unshift(currentVideoObj);
        if (history.length > 40) history.pop();
        localStorage.setItem('yt_my_history', JSON.stringify(history));

        if (!ytPlayer) {
            ytPlayer = new YT.Player('yt-api-player', {
                videoId: id,
                playerVars: { 'autoplay': 1, 'rel': 0, 'start': startTime },
                events: {
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            clearInterval(timeTracker);
                            timeTracker = setInterval(saveCurrentTime, 2000); 
                        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                            clearInterval(timeTracker); saveCurrentTime(); 
                        }
                    }
                }
            });
        } else {
            ytPlayer.loadVideoById({ videoId: id, startSeconds: startTime });
        }

        fetchVideoDetails(id);
        if (channelId) fetchChannelAvatar(channelId);
        fetchRecommended(title);
    }

    function fetchVideoDetails(videoId) {
        var url = 'https://www.googleapis.com/youtube/v3/videos?part=snippet&id=' + videoId + '&key=' + API_KEY;
        fetch(url).then(function(res) { return res.json(); }).then(function(data) {
            if (data.items && data.items.length > 0) {
                var desc = data.items[0].snippet.description;
                document.getElementById('watch-description-display').innerText = desc ? desc : "No description provided.";
            }
        });
    }

    function fetchChannelAvatar(channelId) {
        var url = 'https://www.googleapis.com/youtube/v3/channels?part=snippet&id=' + channelId + '&key=' + API_KEY;
        fetch(url).then(function(res) { return res.json(); }).then(function(data) {
            if (data.items && data.items.length > 0) {
                document.getElementById('watch-creator-avatar').src = data.items[0].snippet.thumbnails.default.url;
            }
        });
    }

    function fetchRecommended(videoTitle) {
        // Search API using the first few words of the video title to simulate related videos
        var shortTitle = videoTitle.split(' ').slice(0, 3).join(' ');
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&type=video&q=' + encodeURIComponent(shortTitle) + '&key=' + API_KEY;
        
        fetch(url).then(function(res) { return res.json(); }).then(function(data) {
            var grid = document.getElementById('recommended-grid');
            grid.innerHTML = '';
            if (data.items) {
                for (var i = 0; i < data.items.length; i++) {
                    var item = data.items[i];
                    var rId = item.id.videoId;
                    var rTitle = item.snippet.title;
                    var rThumb = item.snippet.thumbnails.medium.url;
                    var rChan = item.snippet.channelTitle;
                    var rChanId = item.snippet.channelId;
                    
                    if (rId === currentPlayingId) continue; // Skip currently playing

                    var sideCard = document.createElement('div');
                    sideCard.className = 'side-card';
                    sideCard.innerHTML = 
                        '<div class="side-thumb"><img src="' + rThumb + '"></div>' +
                        '<div class="side-text"><div class="side-info">' + rTitle + '</div><div class="side-channel">' + rChan + '</div></div>';
                    
                    sideCard.onclick = (function(id, t, th, c, cid) {
                        return function() { window.scrollTo(0,0); playVideo(id, t, th, c, cid); };
                    })(rId, rTitle, rThumb, rChan, rChanId);

                    grid.appendChild(sideCard);
                }
            }
        });
    }

    // --- CREATOR PAGE LOGIC ---
    function openChannelPage(channelId, channelTitle) {
        if (ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        showView('channel-view');
        
        document.getElementById('channel-page-name').innerText = channelTitle;
        document.getElementById('channel-page-avatar').src = 'https://via.placeholder.com/120/333333/ffffff?text=?';
        document.getElementById('channel-page-stats').innerText = "Loading stats...";
        document.getElementById('channel-video-grid').innerHTML = 'Loading videos...';

        // Get Channel Stats/Avatar
        var chanUrl = 'https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=' + channelId + '&key=' + API_KEY;
        fetch(chanUrl).then(function(res) { return res.json(); }).then(function(data) {
            if (data.items && data.items.length > 0) {
                var info = data.items[0];
                document.getElementById('channel-page-avatar').src = info.snippet.thumbnails.high.url;
                
                var subs = info.statistics.subscriberCount;
                var viewCount = info.statistics.viewCount;
                var subText = subs ? Number(subs).toLocaleString() + ' Subscribers' : 'Subscribers hidden';
                document.getElementById('channel-page-stats').innerText = subText + ' • ' + Number(viewCount).toLocaleString() + ' Total Views';
            }
        });

        // Get Channel Latest Videos
        var vidsUrl = 'https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=' + channelId + '&maxResults=20&order=date&type=video&key=' + API_KEY;
        fetch(vidsUrl).then(function(res) { return res.json(); }).then(function(data) {
            var grid = document.getElementById('channel-video-grid');
            grid.innerHTML = '';
            if (data.items) {
                for (var i = 0; i < data.items.length; i++) {
                    var item = data.items[i];
                    grid.appendChild(createCard(item.id.videoId, item.snippet.title, item.snippet.thumbnails.medium.url, item.snippet.channelTitle, channelId));
                }
            }
        });
    }

    // --- MAIN FEED FUNCTIONS ---
    function loadMyFeed() {
        showView('main-view');
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        var url;

        if (history.length === 0) {
            document.getElementById('results-label').innerText = 'Trending Now';
            url = 'https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&regionCode=US&maxResults=50&key=' + API_KEY;
        } else {
            var randomPastVideo = history[Math.floor(Math.random() * history.length)];
            var searchTitle = randomPastVideo.title;
            document.getElementById('results-label').innerText = 'Because you watched: ' + searchTitle.substring(0, 30);
            url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&type=video&key=' + API_KEY + '&q=' + encodeURIComponent(searchTitle);
        }
        
        fetch(url).then(function(res) { return res.json(); }).then(function(data) { 
            renderGrid(data.items); 
        });
    }

    function searchVideos() {
        showView('main-view');
        var q = document.getElementById('query').value;
        if (!q) return;
        
        document.getElementById('results-label').innerText = 'Search Results for: ' + q;
        var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&type=video&key=' + API_KEY + '&q=' + encodeURIComponent(q);
        
        fetch(url).then(function(res) { return res.json(); }).then(function(data) { renderGrid(data.items); });
    }

    function renderGrid(items) {
        var grid = document.getElementById('results-grid');
        grid.innerHTML = '';
        if(!items) return;
        
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var id = item.id.videoId || item.id; 
            var title = item.snippet.title;
            var thumb = item.snippet.thumbnails.medium.url;
            var cTitle = item.snippet.channelTitle;
            var cId = item.snippet.channelId;
            grid.appendChild(createCard(id, title, thumb, cTitle, cId));
        }
    }

    // --- UTILITIES ---
    function saveCurrentTime() {
        if (ytPlayer && currentPlayingId) {
            var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
            for (var i = 0; i < history.length; i++) {
                if (history[i].id === currentPlayingId) {
                    history[i].savedTime = ytPlayer.getCurrentTime();
                    history[i].totalTime = ytPlayer.getDuration(); 
                    break;
                }
            }
            localStorage.setItem('yt_my_history', JSON.stringify(history));
        }
    }

    function getProgressHTML(id) {
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        for (var i = 0; i < history.length; i++) {
            if (history[i].id === id && history[i].totalTime > 0) {
                var percentage = (history[i].savedTime / history[i].totalTime) * 100;
                if (percentage > 1) return '<div class="progress-bg"><div class="progress-bar" style="width:' + percentage + '%;"></div></div>';
            }
        }
        return ''; 
    }

    function addToQueue(id, title, thumb, channelTitle, channelId) {
        myQueue.push({ id: id, title: title, thumb: thumb, channelTitle: channelTitle, channelId: channelId });
        alert('Added to Queue!');
    }

    function showHistory() {
        showView('main-view');
        document.getElementById('results-label').innerText = 'Your Watch History';
        var history = JSON.parse(localStorage.getItem('yt_my_history')) || [];
        var grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 

        for (var i = 0; i < history.length; i++) {
            var item = history[i];
            grid.appendChild(createCard(item.id, item.title, item.thumb, item.channelTitle, item.channelId));
        }
    }

    function showQueue() {
        showView('main-view');
        document.getElementById('results-label').innerText = 'Up Next (Your Queue)';
        var grid = document.getElementById('results-grid');
        grid.innerHTML = ''; 
        for (var i = 0; i < myQueue.length; i++) {
            var item = myQueue[i];
            grid.appendChild(createCard(item.id, item.title, item.thumb, item.channelTitle, item.channelId));
        }
    }

    function changeAccentColor() {
        document.documentElement.style.setProperty('--accent', document.getElementById('accent-picker').value);
    }
</script>

        <button id="btn-cloak" style="background: #b30000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;">APPLY</button>
        <button id="btn-reset-cloak" style="background: #333; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-left: 5px;">RESET</button>
        
        <div style="margin-top: 10px; font-size: 0.7rem; color: #666;">Press Alt + R to Open / ESC to Close</div>
    </div>
    `;

    // Add to body
    const div = document.createElement('div');
    div.innerHTML = html;
    document.body.appendChild(div);

    // --- VARIABLES ---
    const menu = document.getElementById('cloaker-menu');
    const inputTitle = document.getElementById('cloak-title');
    const inputDomain = document.getElementById('cloak-domain');
    const inputIconUrl = document.getElementById('cloak-icon-url');
    const selectPreset = document.getElementById('cloak-preset');
    const imgPreview = document.getElementById('icon-preview');
    
    const btnGrab = document.getElementById('btn-grab');
    const btnApply = document.getElementById('btn-cloak');
    const btnReset = document.getElementById('btn-reset-cloak');

    // --- FUNCTIONS ---

    function setFavicon(url) {
        let link = document.querySelector("link[rel~='icon']");
        if (!link) {
            link = document.createElement('link');
            link.rel = 'icon';
            document.getElementsByTagName('head')[0].appendChild(link);
        }
        link.href = url;
    }

    function loadSettings() {
        const savedTitle = localStorage.getItem('faz_cloak_title');
        const savedIcon = localStorage.getItem('faz_cloak_icon');

        if (savedTitle) {
            document.title = savedTitle;
            inputTitle.value = savedTitle;
        }

        if (savedIcon) {
            setFavicon(savedIcon);
            inputIconUrl.value = savedIcon;
            showPreview(savedIcon);
        }
    }

    function showPreview(url) {
        imgPreview.src = url;
        imgPreview.style.display = 'inline-block';
    }

    // 1. PRESET HANDLER
    selectPreset.addEventListener('change', function() {
        const val = this.value;
        if(!val) return;
        
        const parts = val.split('|'); // Split "Name|URL"
        inputTitle.value = parts[0];
        inputIconUrl.value = parts[1];
        showPreview(parts[1]);
    });

    // 2. DOMAIN GRABBER HANDLER
    btnGrab.addEventListener('click', function() {
        const domain = inputDomain.value.trim();
        if(!domain) return;

        // Use Google's S2 Service to fetch favicon
        const iconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
        
        inputIconUrl.value = iconUrl;
        showPreview(iconUrl);
    });

    // 3. APPLY SETTINGS
    function applyCloak() {
        const t = inputTitle.value;
        const i = inputIconUrl.value;

        if (t) {
            document.title = t;
            localStorage.setItem('faz_cloak_title', t);
        }
        
        if (i) {
            setFavicon(i);
            localStorage.setItem('faz_cloak_icon', i);
        }

        menu.style.display = 'none';
    }

    // 4. RESET
    function resetCloak() {
        localStorage.removeItem('faz_cloak_title');
        localStorage.removeItem('faz_cloak_icon');
        location.reload(); 
    }

    // --- KEY LISTENERS ---
    document.addEventListener('keydown', function(e) {
        if (e.altKey && e.key.toLowerCase() === 'r') {
            e.preventDefault();
            menu.style.display = 'block';
        }
        if (e.key === 'Escape') {
            menu.style.display = 'none';
        }
    });

    btnApply.addEventListener('click', applyCloak);
    btnReset.addEventListener('click', resetCloak);

    // Load on start
    loadSettings();

})();
</script>

</body>
</html>
